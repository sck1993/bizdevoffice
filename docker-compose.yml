services:
  openclaw:
    image: openclaw/openclaw:latest
    restart: unless-stopped

  clawoffice:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "3001:3000"
    environment:
      NODE_ENV: production
      PORT: 3000
      OPENCLAW_URL: ws://openclaw:3000
    depends_on:
      - openclaw
